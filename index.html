<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابطي | My Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- تدريجة الألوان بناءً على الصورة المرسلة --- */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 45%, #757575 100%); 
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            padding: 20px 0;
        }

        /* --- نمط Beacons: البنر والبروفايل في إطار أبيض واحد --- */
        .profile-header-white {
            background: #ffffff;
            border-radius: 30px;
            margin: 0 15px 20px 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .banner-section {
            width: 100%;
            height: 160px;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://up6.cc/2026/04/177620163151421.jpg');
            background-size: cover;
            background-position: center;
        }

        .profile-info {
            padding: 60px 20px 20px 20px;
            position: relative;
            color: #1a1a1a; /* نص داكن داخل الأبيض */
        }

        .profile-image-container {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: #fff;
            padding: 5px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .profile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .profile-info h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .profile-info .username {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        /* --- أيقونات التواصل الاجتماعي الصغيرة --- */
        .social-mini-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-mini-icons a {
            color: #1a1a1a;
            font-size: 20px;
            opacity: 0.8;
            transition: 0.3s;
        }

        /* --- المربع الرئيسي للروابط (نمط Beacons الأبيض) --- */
        .main-box {
            background: #ffffff;
            border-radius: 30px;
            margin: 0 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* تعديل أزرار الروابط لتصبح كبسولات أنيقة */
        .link-item {
            background: #28282e;
            border-radius: 50px; /* شكل كبسولة */
            padding: 14px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: #e5e5e5;
            transform: scale(1.02);
        }

        .link-item i {
            margin-left: 10px;
            font-size: 18px;
        }

        /* صورة Billie Eilish في الأسفل */
        .bottom-art-section {
            margin: 20px 15px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .bottom-art-image {
            width: 100%;
            display: block;
        }

        /* الحقوق */
        .footer {
            margin: 25px 0;
        }

        .my-rights {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-header-white">
            <div class="banner-section"></div>
            <div class="profile-info">
                <div class="profile-image-container">
                    <img src="https://up6.cc/2026/04/177620163154242.jpg" alt="Profile">
                </div>
                <h1>عاصم</h1>
                <div class="username">@0iv1</div>
                
                <div class="social-mini-icons">
                    <a href="https://tiktok.com/@ase.m7"><i class="fab fa-tiktok"></i></a>
                    <a href="https://instagram.com/"><i class="fab fa-instagram"></i></a>
                    <a href="https://snapchat.com/t/wfcSQVlH"><i class="fab fa-snapchat"></i></a>
                </div>
            </div>
        </div>

        <div class="main-box">
            <a href="https://tiktok.com/@ase.m7" class="link-item">
                <i class="fab fa-tiktok"></i>
                تيك توك | TikTok
            </a>

            <a href="https://snapchat.com/t/wfcSQVlH" class="link-item">
                <i class="fab fa-snapchat"></i>
                سناب شات | Snapchat
            </a>

            <a href="https://discord.com/users/0iv1" class="link-item">
                <i class="fab fa-discord"></i>
                ديسكورد | Discord
            </a>

            <div style="border-radius:20px; overflow:hidden;">
                <iframe style="border-radius:12px" 
                    src="https://open.spotify.com/embed/track/2r8n2kASyAVGVPoxfq5QQi?si=4e1760dce93e4794" 
                    width="100%" 
                    height="152" 
                    frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <div class="bottom-art-section">
            <img src="https://up6.cc/2026/04/177620163154242.jpg" alt="Art" class="bottom-art-image">
        </div>

        <div class="footer">
            <a href="#" class="my-rights">   عاصم</a>
        </div>
    </div>

</body>
</html>
